<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptVault | Pro Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0f172a; --secondary: #3b82f6; --accent: #8b5cf6; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--primary); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 480px; background: var(--glass); backdrop-filter: blur(25px); border: 1px solid var(--border); border-radius: 32px; padding: 30px 24px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); }
        h2 { font-weight: 800; letter-spacing: -1.5px; margin: 0 0 20px 0; background: linear-gradient(90deg, var(--secondary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; }
        
        .tab-btn { background: none; border: 1px solid var(--border); color: #94a3b8; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: 700; margin-bottom: 15px; transition: 0.3s; }
        .tab-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }

        textarea { width: 100%; height: 100px; border-radius: 18px; padding: 15px; background: rgba(0, 0, 0, 0.3); color: white; border: 1px solid var(--border); font-size: 15px; outline: none; transition: 0.3s; resize: none; }
        .upload-box { margin-top: 15px; padding: 20px; border: 2px dashed var(--border); border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; display: none; }
        .upload-box.active { display: block; }
        .upload-box:hover { border-color: var(--secondary); background: rgba(59, 130, 246, 0.05); }

        .controls { display: flex; gap: 10px; margin-top: 15px; }
        .control-item { flex: 1; text-align: left; }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        select { width: 100%; background: #1e293b; color: white; border: 1px solid var(--border); padding: 10px; border-radius: 10px; font-size: 12px; }

        button#genBtn { background: linear-gradient(135deg, var(--secondary), var(--accent)); color: white; padding: 18px; border-radius: 18px; border: none; font-weight: 800; margin-top: 20px; width: 100%; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:disabled { filter: grayscale(1); opacity: 0.5; }
        #status { margin-top: 20px; font-size: 12px; color: #94a3b8; font-weight: 700; }
        video { width: 100%; margin-top: 25px; border-radius: 24px; display: none; border: 1px solid var(--border); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>STUDIO PRO</h2>
        
        <div style="display: flex; gap: 8px;">
            <button class="tab-btn active" id="t2vTab" onclick="switchMode('t2v')">TEXT TO VIDEO</button>
            <button class="tab-btn" id="i2vTab" onclick="switchMode('i2v')">IMAGE TO VIDEO</button>
        </div>

        <textarea id="prompt" placeholder="Describe the motion..."></textarea>
        
        <div id="imageUpload" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <span id="uploadLabel">Tap to upload reference photo</span>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
        </div>

        <div class="controls">
            <div class="control-item">
                <label>Ratio</label>
                <select id="ratio">
                    <option value="1280*720">16:9 (Reels)</option>
                    <option value="720*1280">9:16 (TikTok)</option>
                    <option value="1024*1024">1:1 (Post)</option>
                </select>
            </div>
            <div class="control-item">
                <label>Length</label>
                <select id="duration">
                    <option value="81">Standard (5s)</option>
                    <option value="121">Extended (8s)</option>
                </select>
            </div>
        </div>

        <button id="genBtn" onclick="generate()">Initialize Rendering</button>
        <div id="status">Systems Nominal</div>
        <video id="output" controls autoplay loop></video>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        let currentMode = 't2v';
        let base64Image = null;

        window.switchMode = (mode) => {
            currentMode = mode;
            document.getElementById('t2vTab').classList.toggle('active', mode === 't2v');
            document.getElementById('i2vTab').classList.toggle('active', mode === 'i2v');
            document.getElementById('imageUpload').style.display = (mode === 'i2v') ? 'block' : 'none';
        };

        window.handleFile = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('uploadLabel').innerText = "✅ Image Locked: " + file.name;
            };
            reader.readAsDataURL(file);
        };

        window.generate = async () => {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const video = document.getElementById('output');
            const prompt = document.getElementById('prompt').value;
            const ratio = document.getElementById('ratio').value;
            const frames = document.getElementById('duration').value;

            if(!prompt) return alert("Prompt required.");
            if(currentMode === 'i2v' && !base64Image) return alert("Please upload an image for I2V mode.");

            try {
                btn.disabled = true;
                btn.innerText = "Syncing...";
                status.innerText = "Connecting to r3gm/wan2-2 Engine...";
                
                // Using the specific engine for both T2V and I2V
                const client = await Client.connect("r3gm/wan2-2-fp8da-aoti-preview"); 
                
                status.innerText = "Queued. Rendering frames...";
                btn.innerText = "Generating...";

                // API Payload adjustment based on mode
                const payload = currentMode === 't2v' ? {
                    prompt: prompt,
                    seed: -1,
                    aspect_ratio: ratio
                } : {
                    input_image: base64Image,
                    prompt: prompt,
                    seed: -1,
                    aspect_ratio: ratio
                };

                const result = await client.predict(currentMode === 't2v' ? "/generate_video" : "/generate_video_i2v", payload);

                if (result.data && result.data[0]) {
                    video.src = result.data[0].url;
                    video.style.display = "block";
                    status.innerText = "Sequence Exported Successfully.";
                }
            } catch (err) {
                console.error(err);
                status.innerText = "Capacity Alert: Try again in 30s.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Initialize Rendering";
            }
        };
    </script>
</body>
</html>
