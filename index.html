<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptVault | Pro Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>STUDIO PRO</h2>
        
        <div style="display: flex; gap: 8px;">
            <button class="tab-btn active" id="t2vTab" onclick="switchMode('t2v')">TEXT TO VIDEO</button>
            <button class="tab-btn" id="i2vTab" onclick="switchMode('i2v')">IMAGE TO VIDEO</button>
        </div>

        <textarea id="prompt" placeholder="Envision the motion..."></textarea>
        
        <div id="imageUpload" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <span id="uploadLabel">Tap to upload reference photo</span>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
        </div>

        <div class="controls">
            <div class="control-item">
                <label>Engine (Select Stable First)</label>
                <select id="engineSelect">
                    <option value="fffiloni/Wan2.1-T2V-14B">Wan 2.1 Stable (Best Uptime)</option>
                    <option value="Lightricks/LTX-Video">LTX Turbo (Fastest)</option>
                    <option value="a-r-r-o-w/Wan2.1-I2V-14B-480P">Wan I2V (Optimized)</option>
                </select>
            </div>
            <div class="control-item">
                <label>Ratio</label>
                <select id="ratio">
                    <option value="1280*720">16:9 (Reels)</option>
                    <option value="720*1280">9:16 (TikTok)</option>
                </select>
            </div>
        </div>

        <button id="genBtn" onclick="generate()">Initialize Rendering</button>
        <div id="status"><span style="color: #10b981;">●</span> Systems Nominal</div>
        
        <video id="output" controls autoplay loop></video>
        <button id="dlBtn" style="display:none; background: #10b981; margin-top: 10px; width: 100%; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800;" onclick="downloadVideo()">DOWNLOAD VIDEO</button>
        <button id="resetBtn" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; font-size: 10px; padding: 10px; margin-top: 10px; width: 100%; border-radius: 12px;" onclick="location.reload()">FORCE RESET ENGINE</button>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        let currentMode = 't2v';
        let base64Image = null;
        let lastResultUrl = null;

        window.switchMode = (mode) => {
            currentMode = mode;
            document.getElementById('t2vTab').classList.toggle('active', mode === 't2v');
            document.getElementById('i2vTab').classList.toggle('active', mode === 'i2v');
            document.getElementById('imageUpload').style.display = (mode === 'i2v') ? 'block' : 'none';
        };

        window.handleFile = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('uploadLabel').innerText = "✅ Image Locked";
            };
            reader.readAsDataURL(file);
        };

        window.downloadVideo = () => {
            if(!lastResultUrl) return;
            const a = document.createElement('a');
            a.href = lastResultUrl;
            a.download = `PromptVault_AI_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.generate = async () => {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const video = document.getElementById('output');
            const dlBtn = document.getElementById('dlBtn');
            const engine = document.getElementById('engineSelect').value;
            const promptValue = document.getElementById('prompt').value;

            if(!promptValue) return alert("Please enter a prompt.");

            try {
                btn.disabled = true;
                btn.innerText = "CONNECTING...";
                status.innerHTML = `<span style="color: #3b82f6;">●</span> Pinging ${engine.split('/')[1]}...`;
                
                // Connection with a shorter timeout logic
                const client = await Client.connect(engine); 
                
                status.innerHTML = `<span style="color: #8b5cf6;">●</span> Engine found. Rendering...`;
                btn.innerText = "GENERATING...";

                // Handle Different Engine Parameters
                let result;
                if(engine.includes("LTX")) {
                    result = await client.predict("/predict", { prompt: promptValue });
                } else if(currentMode === 't2v') {
                    result = await client.predict("/text_to_video", { prompt: promptValue });
                } else {
                    result = await client.predict("/image_to_video", { image: base64Image, prompt: promptValue });
                }

                if (result.data && result.data[0]) {
                    lastResultUrl = result.data[0].url || result.data[0];
                    video.src = lastResultUrl;
                    video.style.display = "block";
                    dlBtn.style.display = "block";
                    status.innerHTML = `<span style="color: #10b981;">●</span> SUCCESS! EXPORT READY`;
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = `<span style="color: #ef4444;">●</span> ENGINE BUSY. TRY "LTX TURBO".`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Initialize Rendering";
            }
        };
    </script>
</body>
</html>
