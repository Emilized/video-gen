<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptVault | Multi-Engine Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>STUDIO PRO</h2>
        
        <div style="display: flex; gap: 8px;">
            <button class="tab-btn active" id="t2vTab" onclick="switchMode('t2v')">TEXT TO VIDEO</button>
            <button class="tab-btn" id="i2vTab" onclick="switchMode('i2v')">IMAGE TO VIDEO</button>
        </div>

        <textarea id="prompt" placeholder="Envision the motion..."></textarea>
        
        <div id="imageUpload" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <span id="uploadLabel">Tap to upload reference photo</span>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
        </div>

        <div class="controls">
            <div class="control-item">
                <label>Engine</label>
                <select id="engineSelect">
                    <option value="r3gm/wan2-2-fp8da-aoti-preview">Wan2.2 (High Quality)</option>
                    <option value="KingNish/wan2-2-fast">Wan2.2 (Turbo/Fast)</option>
                    <option value="Lightricks/LTX-Video">LTX (Real-time)</option>
                </select>
            </div>
            <div class="control-item">
                <label>Ratio</label>
                <select id="ratio">
                    <option value="1280*720">16:9 (Reels)</option>
                    <option value="720*1280">9:16 (TikTok)</option>
                </select>
            </div>
        </div>

        <button id="genBtn" onclick="generate()">Initialize Rendering</button>
        <div id="status"><span style="color: #10b981;">●</span> Systems Nominal</div>
        
        <video id="output" controls autoplay loop></video>
        <button id="dlBtn" style="display:none; background: #10b981; margin-top: 10px;" onclick="downloadVideo()">DOWNLOAD VIDEO</button>
        <button id="resetBtn" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; font-size: 10px; padding: 10px; margin-top: 10px; width: 100%; border-radius: 12px;" onclick="location.reload()">FORCE RESET ENGINE</button>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        let currentMode = 't2v';
        let base64Image = null;
        let lastResultUrl = null;

        window.switchMode = (mode) => {
            currentMode = mode;
            document.getElementById('t2vTab').classList.toggle('active', mode === 't2v');
            document.getElementById('i2vTab').classList.toggle('active', mode === 'i2v');
            document.getElementById('imageUpload').style.display = (mode === 'i2v') ? 'block' : 'none';
        };

        window.handleFile = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('uploadLabel').innerText = "✅ Image Locked";
            };
            reader.readAsDataURL(file);
        };

        window.downloadVideo = () => {
            if(!lastResultUrl) return;
            const a = document.createElement('a');
            a.href = lastResultUrl;
            a.download = `PromptVault_AI_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.generate = async () => {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const video = document.getElementById('output');
            const dlBtn = document.getElementById('dlBtn');
            const engine = document.getElementById('engineSelect').value;
            const promptValue = document.getElementById('prompt').value;
            const ratio = document.getElementById('ratio').value;

            if(!promptValue) return alert("System requires a prompt.");

            try {
                btn.disabled = true;
                dlBtn.style.display = "none";
                btn.innerText = "COMMAND SENT...";
                status.innerHTML = `<span style="color: #3b82f6;">●</span> Syncing with ${engine}...`;
                
                const client = await Client.connect(engine); 
                
                status.innerHTML = `<span style="color: #8b5cf6;">●</span> Rendering Cloud Frames...`;
                btn.innerText = "GENERATING...";

                // Determine endpoint based on engine
                const endpoint = engine.includes("LTX") ? "/predict" : (currentMode === 't2v' ? "/generate_video" : "/generate_video_i2v");

                const payload = {
                    prompt: promptValue,
                    seed: -1,
                    aspect_ratio: ratio
                };
                if(currentMode === 'i2v') payload.input_image = base64Image;

                const result = await client.predict(endpoint, payload);

                if (result.data && result.data[0]) {
                    lastResultUrl = result.data[0].url;
                    video.src = lastResultUrl;
                    video.style.display = "block";
                    dlBtn.style.display = "block";
                    status.innerHTML = `<span style="color: #10b981;">●</span> SEQUENCE EXPORTED`;
                    
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = `<span style="color: #ef4444;">●</span> ENGINE BUSY. SWITCH ENGINE OR RETRY.`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Initialize Rendering";
            }
        };
    </script>
</body>
</html>
