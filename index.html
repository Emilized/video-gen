<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptVault | Pro Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>STUDIO PRO</h2>
        
        <div style="display: flex; gap: 8px;">
            <button class="tab-btn active" id="t2vTab" onclick="switchMode('t2v')">TEXT TO VIDEO</button>
            <button class="tab-btn" id="i2vTab" onclick="switchMode('i2v')">IMAGE TO VIDEO</button>
        </div>

        <textarea id="prompt" placeholder="Describe the motion..."></textarea>
        
        <div id="imageUpload" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <span id="uploadLabel">Tap to upload reference photo</span>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
        </div>

        <div class="controls">
            <div class="control-item">
                <label>Ratio</label>
                <select id="ratio">
                    <option value="1280*720">16:9 (Reels)</option>
                    <option value="720*1280">9:16 (TikTok)</option>
                    <option value="1024*1024">1:1 (Post)</option>
                </select>
            </div>
            <div class="control-item">
                <label>Length</label>
                <select id="duration">
                    <option value="81">Standard (5s)</option>
                    <option value="121">Extended (8s)</option>
                </select>
            </div>
        </div>

        <button id="genBtn" onclick="generate()">Initialize Rendering</button>
        <div id="status"><span style="color: #10b981;">●</span> Systems Nominal</div>
        
        <video id="output" controls autoplay loop></video>
        
        <button id="dlBtn" style="display:none; background: #10b981; margin-top: 10px;" onclick="downloadVideo()">DOWNLOAD VIDEO</button>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        let currentMode = 't2v';
        let base64Image = null;
        let lastResultUrl = null;

        // Ask for notification permission
        if ("Notification" in window && Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        window.switchMode = (mode) => {
            currentMode = mode;
            document.getElementById('t2vTab').classList.toggle('active', mode === 't2v');
            document.getElementById('i2vTab').classList.toggle('active', mode === 'i2v');
            document.getElementById('imageUpload').style.display = (mode === 'i2v') ? 'block' : 'none';
        };

        window.handleFile = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('uploadLabel').innerText = "✅ Image Locked";
            };
            reader.readAsDataURL(file);
        };

        window.downloadVideo = () => {
            if(!lastResultUrl) return;
            const a = document.createElement('a');
            a.href = lastResultUrl;
            a.download = `PromptVault_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        window.generate = async () => {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const video = document.getElementById('output');
            const dlBtn = document.getElementById('dlBtn');
            const prompt = document.getElementById('prompt').value;
            const ratio = document.getElementById('ratio').value;

            if(!prompt) return alert("Prompt required.");
            
            try {
                btn.disabled = true;
                dlBtn.style.display = "none";
                btn.innerText = "COMMAND SENT...";
                status.innerHTML = `<span style="color: #3b82f6;">●</span> Syncing with Engine...`;
                
                const client = await Client.connect("r3gm/wan2-2-fp8da-aoti-preview"); 
                
                status.innerHTML = `<span style="color: #8b5cf6;">●</span> Rendering Cloud Frames...`;
                btn.innerText = "GENERATING...";

                const payload = currentMode === 't2v' ? {
                    prompt: prompt,
                    seed: -1,
                    aspect_ratio: ratio
                } : {
                    input_image: base64Image,
                    prompt: prompt,
                    seed: -1,
                    aspect_ratio: ratio
                };

                const result = await client.predict(currentMode === 't2v' ? "/generate_video" : "/generate_video_i2v", payload);

                if (result.data && result.data[0]) {
                    lastResultUrl = result.data[0].url;
                    video.src = lastResultUrl;
                    video.style.display = "block";
                    dlBtn.style.display = "block";
                    status.innerHTML = `<span style="color: #10b981;">●</span> SEQUENCE COMPLETE`;
                    
                    // Haptic & Visual Alert
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    if (Notification.permission === "granted") {
                        new Notification("PromptVault Studio", { body: "Your video is ready!" });
                    }
                }
            } catch (err) {
                console.error(err);
                status.innerHTML = `<span style="color: #ef4444;">●</span> ENGINE BUSY - AUTO-RETRYING...`;
                setTimeout(generate, 6000); // Wait 6 seconds and try again automatically
            } finally {
                btn.disabled = false;
                btn.innerText = "INITIALIZE RENDERING";
            }
        };
    </script>
</body>
</html>
