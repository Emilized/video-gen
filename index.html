<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptVault | Pro Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2>STUDIO PRO</h2>
        
        <div style="display: flex; gap: 8px;">
            <button class="tab-btn active" id="t2vTab" onclick="switchMode('t2v')">TEXT TO VIDEO</button>
            <button class="tab-btn" id="i2vTab" onclick="switchMode('i2v')">IMAGE TO VIDEO</button>
        </div>

        <textarea id="prompt" placeholder="Describe the motion..."></textarea>
        
        <div id="imageUpload" class="upload-box" onclick="document.getElementById('fileInput').click()">
            <span id="uploadLabel">Tap to upload reference photo</span>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
        </div>

        <div class="controls">
            <div class="control-item">
                <label>Ratio</label>
                <select id="ratio">
                    <option value="1280*720">16:9 (Reels)</option>
                    <option value="720*1280">9:16 (TikTok)</option>
                    <option value="1024*1024">1:1 (Post)</option>
                </select>
            </div>
            <div class="control-item">
                <label>Length</label>
                <select id="duration">
                    <option value="81">Standard (5s)</option>
                    <option value="121">Extended (8s)</option>
                </select>
            </div>
        </div>

        <button id="genBtn" onclick="generate()">Initialize Rendering</button>
        <div id="status">Systems Nominal</div>
        <video id="output" controls autoplay loop></video>
    </div>

    <script type="module">
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        let currentMode = 't2v';
        let base64Image = null;

        window.switchMode = (mode) => {
            currentMode = mode;
            document.getElementById('t2vTab').classList.toggle('active', mode === 't2v');
            document.getElementById('i2vTab').classList.toggle('active', mode === 'i2v');
            document.getElementById('imageUpload').style.display = (mode === 'i2v') ? 'block' : 'none';
        };

        window.handleFile = (input) => {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result;
                document.getElementById('uploadLabel').innerText = "✅ Image Locked: " + file.name;
            };
            reader.readAsDataURL(file);
        };

        window.generate = async () => {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const video = document.getElementById('output');
            const prompt = document.getElementById('prompt').value;
            const ratio = document.getElementById('ratio').value;

            if(!prompt) return alert("Prompt required.");
            if(currentMode === 'i2v' && !base64Image) return alert("Please upload an image.");

            try {
                btn.disabled = true;
                btn.innerText = "Syncing...";
                status.innerText = "Connecting to Engine...";
                
                const client = await Client.connect("r3gm/wan2-2-fp8da-aoti-preview"); 
                
                status.innerText = "Rendering frames...";
                btn.innerText = "Generating...";

                const payload = currentMode === 't2v' ? {
                    prompt: prompt,
                    seed: -1,
                    aspect_ratio: ratio
                } : {
                    input_image: base64Image,
                    prompt: prompt,
                    seed: -1,
                    aspect_ratio: ratio
                };

                const result = await client.predict(currentMode === 't2v' ? "/generate_video" : "/generate_video_i2v", payload);

                if (result.data && result.data[0]) {
                    video.src = result.data[0].url;
                    video.style.display = "block";
                    status.innerText = "Sequence Exported Successfully.";
                }
            } catch (err) {
                console.error(err);
                status.innerText = "Engine busy. Re-attempt in 30s.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Initialize Rendering";
            }
        };
    </script>
</body>
</html>
